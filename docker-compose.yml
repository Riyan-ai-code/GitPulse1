version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: gitpulse-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - GITHUB_TOKEN=${GITHUB_TOKEN}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      # Mount the local database.json file to persist audit histories and caches across container lifecycles
      - ./backend/database.json:/app/database.json
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: gitpulse-frontend
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
    depends_on:
      - backend
    restart: always
